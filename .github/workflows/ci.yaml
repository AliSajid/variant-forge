---
name: Continuous integration
on:
    push:
    pull_request:
        branches:
            - main
            - next
        types:
            - closed
    workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
    RUST_BACKTRACE: 1
    MINIMUM_WAIT: 3
    MAXIMUM_WAIT: 10
jobs:
    check_changed_dirs:
      runs-on: ubuntu-latest
      outputs:
        source_changed: ${{steps.changed_dirs.outputs.source}}
        book_changed: ${{steps.changed_dirs.outputs.book}}
      steps:
        - name: Harden Runner
          uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
          with:
            egress-policy: audit

        - name: Checkout the repository
          uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
          with:
            fetch_depth: 2

        - name: Check changed directories
          id: changed_dirs
          uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
          with:
            filters: |
              source:
                - "src/**/*"
                - "tests/**/*"
                - "examples/**/*"
                - "Cargo.toml"
                - "Cargo.lock"
              book:
                - "guide/src/*.md"
                - "guide/book.toml"
                - "README.md"
    ci:
        runs-on: ${{matrix.os}}-latest
        needs: [check_changed_dirs]
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
        outputs:
            result: ${{steps.result.outputs.result}}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - rust: 1.85.0 # MSRV
                      label: msrv
                      logo: ubuntu
                      os: ubuntu
                    - rust: stable
                      label: stable
                      logo: ubuntu
                      os: ubuntu
                    - rust: beta
                      label: beta
                      logo: ubuntu
                      os: ubuntu
                    - rust: nightly
                      label: nightly
                      logo: ubuntu
                      os: ubuntu
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
              with:
                egress-policy: audit

            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - name: Install Rust
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
              with:
                toolchain: ${{matrix.rust}}
                components: rustfmt, clippy
            - name: Install nightly Rust
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: dtolnay/rust-toolchain@efcb852328a9f50117170cc43094fb6f09eaf1ae # nightly
              with:
                toolchain: nightly
                components: rustfmt, clippy
            - name: Cache dependencies
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

            - name: Cargo Build
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo build --verbose

            - name: Cargo Test
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo test

            - name: Cargo Format
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo +nightly fmt --all -- --check

            - name: Cargo Lint
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo clippy -- -D warnings

            - name: Wait before badge creation
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: AliSajid/random-wait-action@ae53f7583f1e6c8e8e0fb4587865b586579b07c0 # v2.11.1
              with:
                minimum: ${{env.MINIMUM_WAIT}}
                maximum: ${{env.MAXIMUM_WAIT}}

            - name: Create Awesome Badge - Success
              uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
              if: success()
              with:
                auth: ${{secrets.GIST_SECRET}}
                gistID: ${{vars.GIST_KEY}}
                filename: ${{matrix.os}}-${{matrix.label}}.json
                label: Build
                namedLogo: ${{matrix.logo}}
                message: Succeeded
                color: green

            - name: Create Awesome Badge - Failure
              uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
              if: failure()
              with:
                auth: ${{secrets.GIST_SECRET}}
                gistID: ${{vars.GIST_KEY}}
                filename: ${{matrix.os}}-${{matrix.label}}.json
                namedLogo: ${{matrix.logo}}
                label: Build
                message: Failed
                isError: true

            - name: Set Result
              if: always()
              id: result
              run: echo "result=${{job.status}}" >> "$GITHUB_OUTPUT"

    generate_code_coverage:
        uses: ./.github/workflows/code_coverage.yaml
        needs: [ci, check_changed_dirs]
        if: ${{needs.check_changed_dirs.outputs.source_changed == 'true'}}
        secrets: inherit # pragma: allowlist secret

    generate_mdbook:
        uses: ./.github/workflows/deploy_mdbook.yaml
        needs: [check_changed_dirs]
        if: ${{needs.check_changed_dirs.outputs.book_changed == 'true'}}
        secrets: inherit # pragma: allowlist secret

    get-next-version:
        uses: ./.github/workflows/get_next_version.yaml
        needs: [ci, check_changed_dirs]
        if: ${{needs.ci.outputs.result == 'success'}}
        secrets: inherit # pragma: allowlist secret

    semantic-release:
        needs: [ci, get-next-version]
        if: ${{needs.get-next-version.outputs.new-release-published == 'true'}}
        uses: ./.github/workflows/release.yaml
        secrets: inherit # pragma: allowlist secret

    build-container:
      permissions:
        contents: read
        id-token: write
        packages: write
      needs: [ci]
      uses: ./.github/workflows/build_container.yaml
      secrets: inherit # pragma: allowlist secret
