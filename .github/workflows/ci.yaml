---
name: Continuous integration
on:
    push:
    pull_request:
        branches:
            - main
            - next
        types:
            - closed
    workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
    RUST_BACKTRACE: 1
    MINIMUM_WAIT: 3
    MAXIMUM_WAIT: 10
jobs:
    check_changed_dirs:
      runs-on: ubuntu-latest
      outputs:
        source_changed: ${{steps.changed_dirs.outputs.source}}
        book_changed: ${{steps.changed_dirs.outputs.book}}
      steps:
        - name: Harden Runner
          uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
          with:
            egress-policy: audit

        - name: Checkout the repository
          uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
          with:
            fetch_depth: 2

        - name: Check changed directories
          id: changed_dirs
          uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
          with:
            filters: |
              source:
                - "src/**/*"
                - "tests/**/*"
                - "examples/**/*"
                - "Cargo.toml"
                - "Cargo.lock"
              book:
                - "guide/src/*.md"
                - "guide/book.toml"
                - "README.md"
    ci:
        runs-on: ${{matrix.os}}-latest
        needs: [check_changed_dirs]
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'
        outputs:
            result: ${{steps.result.outputs.result}}
        strategy:
            fail-fast: false
            matrix:
                include:
                    - rust: 1.85.0 # MSRV
                      label: msrv
                      logo: ubuntu
                      os: ubuntu
                    - rust: stable
                      label: stable
                      logo: ubuntu
                      os: ubuntu
                    - rust: beta
                      label: beta
                      logo: ubuntu
                      os: ubuntu
                    - rust: nightly
                      label: nightly
                      logo: ubuntu
                      os: ubuntu
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f4a75cfd619ee5ce8d5b864b0d183aff3c69b55a # v2.13.1
              with:
                egress-policy: audit

            - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
            - name: Install Rust
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921 # master
              with:
                toolchain: ${{matrix.rust}}
                components: rustfmt, clippy
            - name: Install nightly Rust
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: dtolnay/rust-toolchain@6d653acede28d24f02e3cd41383119e8b1b35921 # nightly
              with:
                toolchain: nightly
                components: rustfmt, clippy
            - name: Cache dependencies
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

            - name: Cargo Build
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo build --verbose

            - name: Cargo Test
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo test

            - name: Cargo Format
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo +nightly fmt --all -- --check

            - name: Cargo Lint
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              run: cargo clippy -- -D warnings

            - name: Wait before badge creation
              if: ${{ needs.check_changed_dirs.outputs.source_changed == 'true' }}
              uses: AliSajid/random-wait-action@cd6450856f807a0b8e50d872f4c80f09249ffe59 # v2.11.0
              with:
                minimum: ${{env.MINIMUM_WAIT}}
                maximum: ${{env.MAXIMUM_WAIT}}

            - name: Create Awesome Badge - Success
              uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
              if: success()
              with:
                auth: ${{secrets.GIST_SECRET}}
                gistID: ${{vars.GIST_KEY}}
                filename: ${{matrix.os}}-${{matrix.label}}.json
                label: Build
                namedLogo: ${{matrix.logo}}
                message: Succeeded
                color: green

            - name: Create Awesome Badge - Failure
              uses: schneegans/dynamic-badges-action@e9a478b16159b4d31420099ba146cdc50f134483 # v1.7.0
              if: failure()
              with:
                auth: ${{secrets.GIST_SECRET}}
                gistID: ${{vars.GIST_KEY}}
                filename: ${{matrix.os}}-${{matrix.label}}.json
                namedLogo: ${{matrix.logo}}
                label: Build
                message: Failed
                isError: true

            - name: Set Result
              if: always()
              id: result
              run: echo "result=${{job.status}}" >> "$GITHUB_OUTPUT"

    generate_code_coverage:
        uses: ./.github/workflows/code_coverage.yaml
        needs: [ci, check_changed_dirs]
        if: ${{needs.check_changed_dirs.outputs.source_changed == 'true'}}
        secrets: inherit # pragma: allowlist secret

    generate_mdbook:
        uses: ./.github/workflows/deploy_mdbook.yaml
        needs: [check_changed_dirs]
        if: ${{needs.check_changed_dirs.outputs.book_changed == 'true'}}
        secrets: inherit # pragma: allowlist secret

    get-next-version:
        uses: ./.github/workflows/get_next_version.yaml
        needs: [ci, check_changed_dirs]
        if: ${{needs.ci.outputs.result == 'success'}}
        secrets: inherit # pragma: allowlist secret

    semantic-release:
        needs: [ci, get-next-version]
        if: ${{needs.get-next-version.outputs.new-release-published == 'true'}}
        uses: ./.github/workflows/release.yaml
        secrets: inherit # pragma: allowlist secret

    build-container:
      permissions:
        contents: read
        id-token: write
        packages: write
      needs: [ci]
      uses: ./.github/workflows/build_container.yaml
      secrets: inherit # pragma: allowlist secret
